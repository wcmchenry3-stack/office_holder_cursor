name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  gate-main-source:
    uses: wcmchenry3-stack/.github/.github/workflows/called-gate-main-source.yml@main
    secrets: inherit

  secret-scan:
    uses: wcmchenry3-stack/.github/.github/workflows/called-secret-scan.yml@main
    secrets: inherit

  lint-python:
    uses: wcmchenry3-stack/.github/.github/workflows/called-lint-python.yml@main
    with:
      python-version: '3.11'
    secrets: inherit

  test-python:
    uses: wcmchenry3-stack/.github/.github/workflows/called-test-python.yml@main
    with:
      # Raised from 50 → 58 → 65 → 72 → 75 → 78 → 80 → 83 after coverage gap work (parties, ai_offices, bulk_import, refs cities/categories)
      # Note: CI (Python 3.11) measures ~2% lower than local (Python 3.14) due to line-count differences
      coverage-threshold: 83
    secrets: inherit

  cve-python:
    uses: wcmchenry3-stack/.github/.github/workflows/called-cve-python.yml@main
    secrets: inherit

  validate-fixtures:
    name: Validate parser fixtures
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate parser fixture manifest
        run: python scripts/validate_parser_fixtures.py

      - name: Run tests
        run: pytest --tb=short -v

  openai-policy:
    uses: wcmchenry3-stack/.github/.github/workflows/called-openai-policy.yml@main
    secrets: inherit

  wikipedia-policy:
    uses: wcmchenry3-stack/.github/.github/workflows/called-wikipedia-policy.yml@main
    with:
      allowed-repo: wcmchenry3-stack/office_holder_cursor
    secrets: inherit

  gemini-policy:
    uses: wcmchenry3-stack/.github/.github/workflows/called-gemini-policy.yml@main
    secrets: inherit

  ui-tests:
    name: Playwright UI tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: pip install playwright && playwright install chromium --with-deps

      - name: Start test server
        run: |
          uvicorn src.main:app --host 127.0.0.1 --port 8000 &
          echo $! > /tmp/uvicorn.pid
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:8000/run > /dev/null 2>&1 && echo "Server ready" && break
            sleep 2
          done
        env:
          OFFICE_HOLDER_DB_PATH: /tmp/playwright_ci.db

      - name: Run Playwright tests
        run: pytest src/test_ui_edit_office_playwright.py src/test_ui_offices_list_playwright.py src/test_ui_run_playwright.py tests/test_axe_a11y.py tests/test_dark_mode_e2e.py tests/test_mobile_e2e.py --tb=short -v
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000
          OFFICE_HOLDER_DB_PATH: /tmp/playwright_ci.db

      - name: Stop test server
        if: always()
        run: kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true
