{% extends "base.html" %}
{% block title %}Run scraper – Office Holder{% endblock %}
{% block content %}
<h1>Run scraper</h1>
<form id="runForm" method="post" action="/api/run">
  <div class="form-group">
    <label>Run</label>
    <select name="run_mode" id="runMode">
      <option value="full">Full run</option>
      <option value="delta" selected>Delta run</option>
      <option value="delta_live">Delta run + live person update</option>
      <option value="full_no_bio">Full run (no bio)</option>
      <option value="delta_no_bio">Delta run (no bio)</option>
      <option value="full_no_bio_refresh">Full run (no bio, refresh cache)</option>
      <option value="delta_no_bio_refresh">Delta run (no bio, refresh cache)</option>
      <option value="bios_only">Bios only (update all individuals)</option>
      <option value="single_bio">Re-run bio for one individual</option>
      <option value="populate_category_terms">Populate terms for office category</option>
      <option value="selected_bios_by_category">Run bios for selected office category</option>
    </select>
  </div>
  <div class="form-group" id="individualRefGroup" style="display:none;">
    <label>Individual (ID or Wikipedia URL)</label>
    <input type="text" name="individual_ref" id="individualRef" placeholder="e.g. 42 or https://en.wikipedia.org/wiki/John_Doe">
  </div>
  <div class="form-group" id="officeCategoryGroup" style="display:none;">
    <label>Office category</label>
    <select name="office_category_id" id="officeCategoryId">
      <option value="">Select office category</option>
      {% for oc in office_categories %}
      <option value="{{ oc.id }}">{{ oc.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="form-group checkbox-group" id="livingOnlyGroup" style="display:none;">
    <label><input type="checkbox" name="living_only" value="1" id="livingOnly"> Only individuals with no death date</label>
  </div>
  <div class="form-group checkbox-group" id="validPagePathsGroup" style="display:none;">
    <label><input type="checkbox" name="valid_page_paths_only" value="1" id="validPagePathsOnly"> Only valid page paths (ignore blank page_path values)</label>
  </div>
  <div class="form-group" id="categoryMatchInfo" style="display:none;">
    <div id="categoryMatchText" class="muted"></div>
  </div>
  <div class="form-group checkbox-group">
    <label><input type="checkbox" name="force_overwrite" value="1" id="forceOverwrite"> Force update</label>
  </div>
  <div class="actions">
    <button type="submit" class="btn" id="runBtn">Run</button>
  </div>
</form>

<div id="runningPanel" class="running-panel" style="display:none;">
  <div class="running-header">
    <span class="spinner" aria-hidden="true"></span>
    <strong>Job running</strong>
  </div>
  <div id="progressMessage" class="running-message"></div>
  <div id="parsingProgressGroup" class="progress-group">
    <div class="progress-row">
      <div id="officeProgressLabel" class="progress-label">Offices: 0 / 0</div>
      <div class="progress-bar-wrap"><div id="officeProgressBar" class="progress-bar" style="width:0%"></div></div>
    </div>
    <div class="progress-row">
      <div id="tableProgressLabel" class="progress-label">Tables: 0 / 0</div>
      <div class="progress-bar-wrap"><div id="tableProgressBar" class="progress-bar" style="width:0%"></div></div>
    </div>
    <div class="progress-row">
      <div id="infoboxProgressLabel" class="progress-label">Infobox: 0 / 0</div>
      <div class="progress-bar-wrap"><div id="infoboxProgressBar" class="progress-bar" style="width:0%"></div></div>
    </div>
  </div>
  <div id="bioProgressGroup" class="progress-group" style="display:none;">
    <div class="progress-row">
      <div id="bioProgressLabel" class="progress-label">Bios: 0 / 0</div>
      <div class="progress-bar-wrap"><div id="bioProgressBar" class="progress-bar" style="width:0%"></div></div>
    </div>
  </div>
  <div id="progressDetail" class="running-detail"></div>
  <button type="button" class="btn btn-secondary" id="runStopBtn" style="margin-top:0.75rem;">Stop</button>
</div>

<div id="result" class="alert" style="display:none;"></div>

<style>
.running-panel {
  margin: 1.5rem 0;
  padding: 1rem 1.25rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
}
.running-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}
.spinner {
  width: 1.25rem;
  height: 1.25rem;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.running-message { color: var(--text); margin-bottom: 0.5rem; }
.running-detail { font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem; }
.muted { color: var(--text-muted); font-size: 0.9rem; }
.progress-bar-wrap {
  height: 8px;
  background: var(--bg3);
  border-radius: 4px;
  overflow: hidden;
}
.progress-group { margin-top: 0.5rem; }
.progress-row + .progress-row { margin-top: 0.5rem; }
.progress-label { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.2rem; }
.progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.3s ease;
}
</style>

<script>
// ---- Run-mode field toggles ----
(function() {
  const runMode = document.getElementById('runMode');
  const individualRefGroup = document.getElementById('individualRefGroup');
  const officeCategoryGroup = document.getElementById('officeCategoryGroup');
  const livingOnlyGroup = document.getElementById('livingOnlyGroup');
  const livingOnly = document.getElementById('livingOnly');
  const validPagePathsGroup = document.getElementById('validPagePathsGroup');
  const validPagePathsOnly = document.getElementById('validPagePathsOnly');
  const forceOverwrite = document.getElementById('forceOverwrite');
  const categoryMatchInfo = document.getElementById('categoryMatchInfo');
  const categoryMatchText = document.getElementById('categoryMatchText');
  const officeCategoryId = document.getElementById('officeCategoryId');

  async function refreshMatchingCount() {
    if (runMode.value !== 'selected_bios_by_category') {
      categoryMatchInfo.style.display = 'none';
      return;
    }
    const officeCategory = officeCategoryId.value;
    if (!officeCategory) {
      categoryMatchInfo.style.display = 'block';
      categoryMatchText.textContent = 'Select an office category to see matching individuals.';
      return;
    }
    categoryMatchInfo.style.display = 'block';
    categoryMatchText.textContent = 'Checking matching individuals…';
    try {
      const params = new URLSearchParams({
        office_category_id: officeCategory,
        living_only: livingOnly.checked ? '1' : '0',
        force_overwrite: forceOverwrite.checked ? '1' : '0',
        valid_page_paths_only: validPagePathsOnly.checked ? '1' : '0',
      });
      const r = await fetch('/api/run/matching-individuals?' + params.toString());
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || data.error || 'Unable to fetch matching individuals');
      categoryMatchText.textContent = `${data.matching_records} matching term records across ${data.matching_individuals} individuals. ${data.eligible_individuals} will be updated with current options.`;
    } catch (err) {
      categoryMatchText.textContent = 'Error: ' + err.message;
    }
  }

  function toggleRunModeFields() {
    individualRefGroup.style.display = runMode.value === 'single_bio' ? 'block' : 'none';
    const showCategory = runMode.value === 'populate_category_terms' || runMode.value === 'selected_bios_by_category';
    officeCategoryGroup.style.display = showCategory ? 'block' : 'none';
    livingOnlyGroup.style.display = runMode.value === 'selected_bios_by_category' ? 'block' : 'none';
    validPagePathsGroup.style.display = runMode.value === 'selected_bios_by_category' ? 'block' : 'none';
    refreshMatchingCount();
  }
  runMode.addEventListener('change', toggleRunModeFields);
  officeCategoryId.addEventListener('change', refreshMatchingCount);
  livingOnly.addEventListener('change', refreshMatchingCount);
  validPagePathsOnly.addEventListener('change', refreshMatchingCount);
  forceOverwrite.addEventListener('change', refreshMatchingCount);
  toggleRunModeFields();
})();

// ---- Progress / polling helpers ----
const _runBtn = document.getElementById('runBtn');
const _resultEl = document.getElementById('result');
const _runningPanel = document.getElementById('runningPanel');
const _progressMessage = document.getElementById('progressMessage');
const _progressDetail = document.getElementById('progressDetail');
const _parsingProgressGroup = document.getElementById('parsingProgressGroup');
const _bioProgressGroup = document.getElementById('bioProgressGroup');
const _officeProgressLabel = document.getElementById('officeProgressLabel');
const _officeProgressBar = document.getElementById('officeProgressBar');
const _tableProgressLabel = document.getElementById('tableProgressLabel');
const _tableProgressBar = document.getElementById('tableProgressBar');
const _infoboxProgressLabel = document.getElementById('infoboxProgressLabel');
const _infoboxProgressBar = document.getElementById('infoboxProgressBar');
const _bioProgressLabel = document.getElementById('bioProgressLabel');
const _bioProgressBar = document.getElementById('bioProgressBar');
const _stopBtn = document.getElementById('runStopBtn');

function _setProgress(labelEl, barEl, label, current, total) {
  const safeCurrent = Number(current) || 0;
  const safeTotal = Number(total) || 0;
  const pct = safeTotal > 0 ? Math.round((safeCurrent / safeTotal) * 100) : 0;
  labelEl.textContent = `${label}: ${safeCurrent} / ${safeTotal}`;
  barEl.style.width = pct + '%';
}

function _resetProgressGroups() {
  _setProgress(_officeProgressLabel, _officeProgressBar, 'Offices', 0, 0);
  _setProgress(_tableProgressLabel, _tableProgressBar, 'Tables', 0, 0);
  _setProgress(_infoboxProgressLabel, _infoboxProgressBar, 'Infobox', 0, 0);
  _setProgress(_bioProgressLabel, _bioProgressBar, 'Bios', 0, 0);
  _parsingProgressGroup.style.display = 'block';
  _bioProgressGroup.style.display = 'none';
}

function _extractProgress(statusObj, key, fallbackCurrent = 0, fallbackTotal = 0) {
  const progressRoot = statusObj.progress || (statusObj.extra && statusObj.extra.progress) || {};
  const nested = (progressRoot[key]) || {};
  const current = nested.current !== undefined ? nested.current : fallbackCurrent;
  const total = nested.total !== undefined ? nested.total : fallbackTotal;
  return { current, total };
}

function _onJobFinished(s) {
  _runningPanel.style.display = 'none';
  _runningPanel.dataset.jobId = '';
  if (_stopBtn) _stopBtn.disabled = true;
  _runBtn.disabled = false;

  if (s.status === 'cancelled') {
    const res = s.result || {};
    let msg = 'Stopped. ' + (res.message || '') + ' Offices processed: ' + (res.office_count || 0) + ', Terms parsed: ' + (res.terms_parsed || 0) + ', Unique URLs: ' + (res.unique_wiki_urls || 0);
    _resultEl.textContent = msg;
    _resultEl.className = 'alert';
    _resultEl.style.display = 'block';
  } else if (s.status === 'complete') {
    const res = s.result || {};
    let msg = 'Done. Offices: ' + (res.office_count || 0) + ', Terms parsed: ' + (res.terms_parsed || 0) + ', Unique URLs: ' + (res.unique_wiki_urls || 0);
    if (res.dry_run) msg += ' (dry run)';
    const bioOk = (res.bio_success_count || 0) + (res.bio_error_count || 0) > 0;
    if (bioOk) {
      msg += '. New bios: ' + (res.bio_success_count || 0) + ' succeeded, ' + (res.bio_error_count || 0) + ' failed';
      if ((res.bio_skipped_count || 0) > 0) msg += ', ' + res.bio_skipped_count + ' skipped (already in DB)';
      if ((res.bio_error_count || 0) > 0 && res.bio_errors && res.bio_errors.length) {
        msg += '. First error: ' + (res.bio_errors[0].error || '') + ' — see run log for full list.';
      }
    }
    const livingOk = (res.living_success_count || 0) + (res.living_error_count || 0) > 0;
    if (livingOk) {
      msg += '. Living update: ' + (res.living_success_count || 0) + ' succeeded, ' + (res.living_error_count || 0) + ' failed';
      if ((res.living_error_count || 0) > 0 && res.living_errors && res.living_errors.length) {
        msg += '. First error: ' + (res.living_errors[0].error || '');
      }
    }
    if (res.office_errors && res.office_errors.length) {
      msg += '. ' + res.office_errors.length + ' table(s) could not be processed: ' + (res.office_errors[0].error || res.office_errors[0].office_name || '');
      if (res.office_errors.length > 1) msg += ' (and ' + (res.office_errors.length - 1) + ' more)';
    }
    _resultEl.textContent = msg;
    if (res.preview_rows && res.preview_rows.length) {
      _resultEl.textContent += ' Preview: ' + JSON.stringify(res.preview_rows.slice(0, 3));
    }
    const hasErrors = (bioOk && res.bio_error_count > 0) || (livingOk && res.living_error_count > 0);
    _resultEl.className = hasErrors ? 'alert alert-error' : 'alert alert-success';
    _resultEl.style.display = 'block';
  } else if (s.status === 'error') {
    _resultEl.textContent = 'Error: ' + (s.error || 'Unknown error');
    _resultEl.className = 'alert alert-error';
    _resultEl.style.display = 'block';
  }
  if (window.playJobCompleteSound) window.playJobCompleteSound();
}

async function _poll(jobId) {
  try {
    const r = await fetch('/api/run/status/' + jobId);
    const s = await r.json();
    _progressMessage.textContent = s.message || s.phase || 'Running…';

    const officeP = _extractProgress(s, 'office', s.current || 0, s.total || 0);
    const tableP = _extractProgress(s, 'table', 0, 0);
    const infoboxP = _extractProgress(s, 'infobox', 0, 0);
    const bioP = _extractProgress(s, 'bio', (s.phase === 'bio' ? (s.current || 0) : 0), (s.phase === 'bio' ? (s.total || 0) : 0));

    _setProgress(_officeProgressLabel, _officeProgressBar, 'Offices', officeP.current, officeP.total);
    _setProgress(_tableProgressLabel, _tableProgressBar, 'Tables', tableP.current, tableP.total);
    _setProgress(_infoboxProgressLabel, _infoboxProgressBar, 'Infobox', infoboxP.current, infoboxP.total);
    _setProgress(_bioProgressLabel, _bioProgressBar, 'Bios', bioP.current, bioP.total);

    const bioPhaseActive = s.phase === 'bio' || s.phase === 'living' || ((Number(bioP.total) || 0) > 0 && (Number(bioP.current) || 0) >= 0);
    _parsingProgressGroup.style.display = bioPhaseActive ? 'none' : 'block';
    _bioProgressGroup.style.display = bioPhaseActive ? 'block' : 'none';

    let detail = s.phase ? s.phase : '';
    if ((s.total || 0) > 1) detail += ' — ' + (s.current || 0) + ' / ' + (s.total || 0);
    if (s.extra && s.extra.terms_so_far !== undefined) detail += ' — ' + s.extra.terms_so_far + ' terms so far';
    if (s.extra && s.extra.bio_skipped !== undefined) detail += ' — ' + s.extra.bio_skipped + ' skipped (in DB)';
    _progressDetail.textContent = detail;

    if (['cancelled', 'complete', 'error'].includes(s.status)) {
      _onJobFinished(s);
      return;
    }
    setTimeout(() => _poll(jobId), 500);
  } catch (err) {
    _runningPanel.style.display = 'none';
    _runningPanel.dataset.jobId = '';
    if (_stopBtn) _stopBtn.disabled = true;
    _resultEl.textContent = 'Error: ' + err.message;
    _resultEl.className = 'alert alert-error';
    _resultEl.style.display = 'block';
    _runBtn.disabled = false;
    if (window.playJobCompleteSound) window.playJobCompleteSound();
  }
}

function _startPolling(jobId) {
  _runBtn.disabled = true;
  _resultEl.style.display = 'none';
  _runningPanel.dataset.jobId = jobId;
  _runningPanel.style.display = 'block';
  if (_stopBtn) _stopBtn.disabled = false;
  _poll(jobId);
}

// On page load: reconnect to any already-running job
(async function checkActiveJob() {
  try {
    const r = await fetch('/api/run/active');
    const data = await r.json();
    if (data && data.job_id) {
      _resetProgressGroups();
      _progressMessage.textContent = 'Job already running…';
      _progressDetail.textContent = '';
      _startPolling(data.job_id);
    }
  } catch (_) {}
})();

// Stop button
if (_stopBtn) {
  _stopBtn.addEventListener('click', async () => {
    const id = _runningPanel.dataset.jobId;
    if (!id) return;
    _stopBtn.disabled = true;
    try {
      await fetch('/api/run/cancel/' + id, { method: 'POST' });
    } catch (_) {}
  });
}

// Form submit
document.getElementById('runForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  _resultEl.style.display = 'none';
  _progressMessage.textContent = 'Starting…';
  _resetProgressGroups();
  _progressDetail.textContent = '';

  const formData = new FormData(e.target);
  let jobId = null;
  try {
    const r = await fetch('/api/run', { method: 'POST', body: formData });
    const data = await r.json();
    if (r.status !== 202 || !data.job_id) {
      throw new Error(data.detail || data.error || 'Failed to start job');
    }
    jobId = data.job_id;
  } catch (err) {
    _resultEl.textContent = 'Error: ' + err.message;
    _resultEl.className = 'alert alert-error';
    _resultEl.style.display = 'block';
    return;
  }
  _startPolling(jobId);
});
</script>
{% endblock %}
