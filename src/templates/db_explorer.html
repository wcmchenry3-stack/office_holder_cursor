{% extends "base.html" %}
{% block title %}SQL Query – Office Holder{% endblock %}
{% block content %}
<h1>SQL Query <small style="font-size:0.6em;font-weight:normal;color:#666">{{ db_type }}</small></h1>

<div style="display:flex;gap:1.5rem;align-items:flex-start;">
  <div style="flex:1;min-width:0;">
    <div class="form-group">
      <label for="sqlInput">Query <small>(SELECT only)</small></label>
      <textarea id="sqlInput" rows="8"
        style="width:100%;font-family:monospace;font-size:0.875rem;resize:vertical;"
        placeholder="SELECT * FROM offices LIMIT 20"></textarea>
    </div>
    <div class="actions" style="margin-bottom:1rem;">
      <button type="button" id="runBtn" class="btn">Run</button>
    </div>

    <div id="queryMeta" style="display:none;margin-bottom:0.5rem;font-size:0.875rem;color:#666;"></div>
    <div id="queryError" class="alert alert-error" style="display:none;" role="alert"></div>

    <div style="overflow-x:auto;">
      <table id="resultsTable" style="display:none;">
        <thead id="resultsHead"></thead>
        <tbody id="resultsBody"></tbody>
      </table>
      <p id="emptyMsg" style="display:none;color:#666;">Query returned no rows.</p>
    </div>
  </div>

  <aside style="width:180px;flex-shrink:0;">
    <strong style="font-size:0.875rem;">Tables</strong>
    <ul style="margin-top:0.5rem;padding-left:0;list-style:none;font-size:0.875rem;">
      {% for t in tables %}
      <li style="margin-bottom:0.25rem;">
        <a href="#" class="table-link" data-table="{{ t }}">{{ t }}</a>
      </li>
      {% else %}
      <li style="color:#666;">No tables found.</li>
      {% endfor %}
    </ul>
  </aside>
</div>

<script>
(function () {
  const sqlInput = document.getElementById('sqlInput');
  const runBtn = document.getElementById('runBtn');
  const queryMeta = document.getElementById('queryMeta');
  const queryError = document.getElementById('queryError');
  const resultsTable = document.getElementById('resultsTable');
  const resultsHead = document.getElementById('resultsHead');
  const resultsBody = document.getElementById('resultsBody');
  const emptyMsg = document.getElementById('emptyMsg');

  document.querySelectorAll('.table-link').forEach(function (a) {
    a.addEventListener('click', function (e) {
      e.preventDefault();
      sqlInput.value = 'SELECT * FROM ' + a.dataset.table + ' LIMIT 50';
      runQuery();
    });
  });

  runBtn.addEventListener('click', runQuery);
  sqlInput.addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runQuery();
  });

  function runQuery() {
    const sql = sqlInput.value.trim();
    if (!sql) return;

    runBtn.disabled = true;
    runBtn.textContent = 'Running…';
    queryError.style.display = 'none';
    queryMeta.style.display = 'none';
    resultsTable.style.display = 'none';
    emptyMsg.style.display = 'none';

    fetch('/db/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sql: sql})
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.error) {
        queryError.textContent = data.error;
        queryError.style.display = '';
        return;
      }

      queryMeta.textContent = data.row_count + ' row' + (data.row_count === 1 ? '' : 's') +
        ' · ' + data.elapsed_ms + ' ms';
      queryMeta.style.display = '';

      if (data.row_count === 0) {
        emptyMsg.style.display = '';
        return;
      }

      resultsHead.innerHTML = '<tr>' + data.columns.map(function (c) {
        return '<th>' + escHtml(c) + '</th>';
      }).join('') + '</tr>';

      resultsBody.innerHTML = data.rows.map(function (row) {
        return '<tr>' + row.map(function (cell) {
          return '<td>' + (cell === null ? '<span style="color:#999">NULL</span>' : escHtml(String(cell))) + '</td>';
        }).join('') + '</tr>';
      }).join('');

      resultsTable.style.display = '';
    })
    .catch(function (err) {
      queryError.textContent = 'Request failed: ' + err.message;
      queryError.style.display = '';
    })
    .finally(function () {
      runBtn.disabled = false;
      runBtn.textContent = 'Run';
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})();
</script>
{% endblock %}
